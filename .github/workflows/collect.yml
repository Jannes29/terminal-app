name: Macro Snapshot Collector

on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: npm install

      - name: Snapshot sammeln
        run: node collect.js

      - name: Commit & Push
        run: |
          git config --global --add safe.directory '*'
          git config user.name "snapshot-bot"
          git config user.email "snapshot-bot@users.noreply.github.com"
          git add history.json
          if git diff --staged --quiet; then
            echo "Kein neuer Snapshot zum Committen."
          else
            git commit -m "snapshot $(date -u +%FT%TZ)"
            git pull --rebase --autostash || true
            git push
          fi
